spring:
   application:
      name: author-service
   rabbitmq:
      host: localhost
      port: 5672
   cloud:
      function:
         definition: receiveBookInfo
      stream:
         bindings:
            receiveBookInfoAuthors-in-0:
               destination: booInfo-out
               group: bookInfo
            receiveBookInfoGroup-in-0:
               destination: bookInfoGrouped-out
               group: bookInfoGroup
            receiveBookInfoPartitioned-in-0:
               destination: bookInfoPartitioned-out
               group: bookInfoGroup
               consumer:
                  partitioned: true
                  instance-index: 0

server:
   port: ${PORT:8082}