<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="560" height="294" viewBox="0 0 560 294">
  <defs>
    <style>
      .card { fill: #15202b; stroke: #38444d; stroke-width: 2; }
      .header { fill: #1DA1F2; }
      .title { fill: #ffffff; font: bold 14px sans-serif; }
      .body { fill: #e7e9ea; font: 13px sans-serif; }
      .code { fill: #89cff0; font: 11px monospace; }
      .code-bg { fill: #192734; stroke: #38444d; stroke-width: 1; }
      .footer { fill: #71767b; font: 10px sans-serif; }
    </style>
  </defs>
  <rect x="0" y="0" width="560" height="294" rx="12" class="card"/>
  <rect x="0" y="0" width="560" height="44" rx="12" class="header"/>
  <rect x="0" y="32" width="560" height="12" class="header"/>
  <text x="20" y="28" class="title">Tweet #28 · codingstrain</text>
    <text x="28" y="100" class="body">Slow external API? Cache it:</text>
  <rect x="24" y="120" width="512" height="118" rx="6" class="code-bg"/>
    <text x="36" y="138" class="code">@Cacheable(value = &quot;weather&quot;, key = &quot;#city&quot;)</text>
    <text x="36" y="156" class="code">public String getWeather(String city) {</text>
    <text x="36" y="174" class="code">  simulateSlowApiCall(); // 3s</text>
    <text x="36" y="192" class="code">  return &quot;Sunny in &quot; + city;</text>
    <text x="36" y="210" class="code">}</text>
  <text x="20" y="278" class="footer">Module: springboot-redis-cache-demo  #SpringBoot #Redis</text>
</svg>
