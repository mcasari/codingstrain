  <text x="20" y="28" class="title">Tweet #10 · codingstrain</text>
    <text x="28" y="100" class="body">Nested config + validation:</text>
    <text x="28" y="122" class="body"></text>
    <text x="28" y="144" class="body">@Valid on nested objects is easy to forget.</text>
  <rect x="24" y="164" width="512" height="154" rx="6" class="code-bg"/>
    <text x="36" y="182" class="code">@Valid</text>
    <text x="36" y="200" class="code">private Security security;</text>
    <text x="36" y="218" class="code"></text>
    <text x="36" y="236" class="code">public static class Security {</text>
    <text x="36" y="254" class="code">  @NotBlank private String username;</text>
    <text x="36" y="272" class="code">  @NotBlank private String password;</text>
    <text x="36" y="290" class="code">}</text>
  <text x="20" y="358" class="footer">Module: spring-boot-validated-config  #SpringBoot</text>
