  <rect x="0" y="0" width="560" height="400" rx="12" class="card"/>
  <rect x="0" y="0" width="560" height="44" rx="12" class="header"/>
  <rect x="0" y="32" width="560" height="12" class="header"/>
  <text x="20" y="28" class="title">Tweet #9 · codingstrain</text>
    <text x="28" y="100" class="body">Fail fast at startup with validated config:</text>
    <text x="28" y="122" class="body"></text>
    <text x="28" y="144" class="body">@Validated + @ConfigurationProperties</text>
    <text x="28" y="166" class="body"></text>
    <text x="28" y="188" class="body">Bad YAML? App won&#x27;t start. That&#x27;s a feature.</text>
  <rect x="24" y="208" width="512" height="136" rx="6" class="code-bg"/>
    <text x="36" y="226" class="code">@Validated</text>
    <text x="36" y="244" class="code">@ConfigurationProperties(prefix = &quot;app&quot;)</text>
    <text x="36" y="262" class="code">public class AppProperties {</text>
    <text x="36" y="280" class="code">  @NotBlank private String name;</text>
    <text x="36" y="298" class="code">  @Min(1) @Max(60) private Integer timeout;</text>
    <text x="36" y="316" class="code">}</text>
  <text x="20" y="384" class="footer">Module: spring-boot-validated-config  #SpringBoot</text>
