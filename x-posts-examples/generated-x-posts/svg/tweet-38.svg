  <text x="20" y="28" class="title">Tweet #38 · codingstrain</text>
    <text x="28" y="100" class="body">@MockBean stubs can leak between tests unless</text>
    <text x="28" y="122" class="body">reset.</text>
    <text x="28" y="144" class="body"></text>
    <text x="28" y="166" class="body">Use @DirtiesContext or Mockito reset.</text>
  <rect x="24" y="186" width="512" height="100" rx="6" class="code-bg"/>
    <text x="36" y="204" class="code">@Test @Order(1) void testA() {</text>
    <text x="36" y="222" class="code">  when(myService.getData()).thenReturn(&quot;A&quot;);</text>
    <text x="36" y="240" class="code">}</text>
    <text x="36" y="258" class="code">@Test @Order(2) void testB() { /* still &quot;A&quot;? */ }</text>
  <text x="20" y="326" class="footer">Module: spring-mock-reset-example  #SpringBoot #Testing</text>
