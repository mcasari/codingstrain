  <text x="20" y="28" class="title">Tweet #25 · codingstrain</text>
    <text x="28" y="100" class="body">Don&#x27;t use the default executor in prod. Define</text>
    <text x="28" y="122" class="body">your pool:</text>
  <rect x="24" y="142" width="512" height="100" rx="6" class="code-bg"/>
    <text x="36" y="160" class="code">executor.setCorePoolSize(2);</text>
    <text x="36" y="178" class="code">executor.setMaxPoolSize(5);</text>
    <text x="36" y="196" class="code">executor.setQueueCapacity(10);</text>
    <text x="36" y="214" class="code">executor.setThreadNamePrefix(&quot;Async-&quot;);</text>
