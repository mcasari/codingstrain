  <rect x="24" y="142" width="512" height="100" rx="6" class="code-bg"/>
    <text x="36" y="160" class="code">User user = new User.Builder(&quot;Mary&quot;, 30)</text>
    <text x="36" y="178" class="code">  .email(&quot;mary@example.com&quot;)</text>
    <text x="36" y="196" class="code">  .address(&quot;Italy&quot;)</text>
    <text x="36" y="214" class="code">  .build();</text>
