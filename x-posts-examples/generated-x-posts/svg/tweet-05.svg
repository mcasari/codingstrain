  <rect x="0" y="0" width="560" height="360" rx="12" class="card"/>
  <rect x="0" y="0" width="560" height="44" rx="12" class="header"/>
  <rect x="0" y="32" width="560" height="12" class="header"/>
  <text x="20" y="28" class="title">Tweet #5 · codingstrain</text>
    <text x="28" y="100" class="body">Raw exceptions in controllers are fine for</text>
    <text x="28" y="122" class="body">demos.</text>
    <text x="28" y="144" class="body"></text>
    <text x="28" y="166" class="body">Production? Map them with @ControllerAdvice +</text>
    <text x="28" y="188" class="body">stable JSON.</text>
  <rect x="24" y="208" width="512" height="118" rx="6" class="code-bg"/>
    <text x="36" y="226" class="code">@GetMapping(&quot;/api/users/{id}&quot;)</text>
    <text x="36" y="244" class="code">public String getUser(@PathVariable Long id) {</text>
    <text x="36" y="262" class="code">  if (id == 1) return &quot;User found&quot;;</text>
    <text x="36" y="280" class="code">  throw new RuntimeException(&quot;Database connection failed!&quot;);</text>
    <text x="36" y="298" class="code">}</text>
  <text x="20" y="344" class="footer">Module: springboot-error-handling-demo  #SpringBoot</text>
</svg>
