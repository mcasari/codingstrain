  <text x="20" y="28" class="title">Tweet #2 · codingstrain</text>
    <text x="28" y="100" class="body">Constructor injection beats field injection:</text>
    <text x="28" y="122" class="body"></text>
    <text x="28" y="144" class="body">public UserController(UserRepository repository)</text>
    <text x="28" y="166" class="body">{</text>
    <text x="28" y="188" class="body">  this.repository = repository;</text>
    <text x="28" y="210" class="body">}</text>
    <text x="28" y="232" class="body"></text>
    <text x="28" y="254" class="body">Spring recommends it. Your tests will thank you.</text>

