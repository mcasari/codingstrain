  <text x="20" y="28" class="title">Tweet #31 · codingstrain</text>
    <text x="28" y="100" class="body">Global CORS in Spring Boot — configure once, no</text>
    <text x="28" y="122" class="body">@CrossOrigin on every controller.</text>
  <rect x="24" y="142" width="512" height="100" rx="6" class="code-bg"/>
    <text x="36" y="160" class="code">registry.addMapping(&quot;/**&quot;)</text>
    <text x="36" y="178" class="code">  .allowedOrigins(&quot;http://localhost:3000&quot;)</text>
    <text x="36" y="196" class="code">  .allowedMethods(&quot;GET&quot;, &quot;POST&quot;, &quot;PUT&quot;, &quot;DELETE&quot;, &quot;OPTIONS&quot;)</text>
    <text x="36" y="214" class="code">  .allowCredentials(true);</text>
