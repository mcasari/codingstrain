  <rect x="0" y="0" width="560" height="382" rx="12" class="card"/>
  <rect x="0" y="0" width="560" height="44" rx="12" class="header"/>
  <rect x="0" y="32" width="560" height="12" class="header"/>
  <text x="20" y="28" class="title">Tweet #3 · codingstrain</text>
    <text x="28" y="100" class="body">Pagination without boilerplate:</text>
    <text x="28" y="122" class="body"></text>
    <text x="28" y="144" class="body">@GetMapping + Pageable → Page&lt;User&gt;</text>
    <text x="28" y="166" class="body"></text>
    <text x="28" y="188" class="body">?page=0&amp;size=20&amp;sort=name,asc — done.</text>
  <rect x="24" y="208" width="512" height="118" rx="6" class="code-bg"/>
    <text x="36" y="226" class="code">@GetMapping</text>
    <text x="36" y="244" class="code">public PagedResponse&lt;User&gt; getUsers(Pageable pageable) {</text>
    <text x="36" y="262" class="code">  Page&lt;User&gt; page = repository.findAll(pageable);</text>
    <text x="36" y="280" class="code">  return new PagedResponse&lt;&gt;(page.getContent(), ...);</text>
    <text x="36" y="298" class="code">}</text>
  <text x="20" y="366" class="footer">Module: spring-boot-paged-rest-example  #SpringBoot</text>
